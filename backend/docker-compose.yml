version: "3.8"

services:
  api:
    build: .
    ports:
      - "18562:18562"
    env_file: .env
    depends_on:
      - redis
    volumes:
      - whisper-models:/root/.transcriptpro/models
      - temp-audio:/root/.transcriptpro/temp
    restart: unless-stopped
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 18562

  worker:
    build: .
    env_file: .env
    depends_on:
      - redis
    volumes:
      - whisper-models:/root/.transcriptpro/models
      - temp-audio:/root/.transcriptpro/temp
    restart: unless-stopped
    command: celery -A app.workers.celery_worker worker --loglevel=info --concurrency=${WORKER_CONCURRENCY:-4}

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    restart: unless-stopped
    # Only listen on localhost (accessed via Docker network)
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru

volumes:
  whisper-models:
  temp-audio:
  redis-data:
